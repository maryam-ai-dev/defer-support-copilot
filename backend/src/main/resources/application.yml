spring:
  application:
    name: defer-backend

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/defer}
    username: ${POSTGRES_USER:defer}
    password: ${POSTGRES_PASSWORD:defer}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
