services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: defer
      POSTGRES_USER: defer
      POSTGRES_PASSWORD: defer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U defer -d defer"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/defer
      POSTGRES_USER: defer
      POSTGRES_PASSWORD: defer
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      postgres:
        condition: service_healthy

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    volumes:
      - ./datasets:/app/datasets
    environment:
      POSTGRES_URL: postgresql://defer:defer@postgres:5432/defer
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"

volumes:
  pgdata:
